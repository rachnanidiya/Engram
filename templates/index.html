<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flashcard Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="sidebar">
        <h3>🗂️ Saved Decks</h3>
        <button onclick="createNewDeckMode()" class="btn-create-deck">
            ➕ Create New Deck
        </button>
        <div id="decksList">Loading historical saves...</div>
    </div>

    <div class="main-content">
        <h1>📚 AI Flashcard Studio</h1>
        <div class="input-container">
            <textarea id="textInput" rows="4" placeholder="Paste structural data here to mint a brand NEW deck..."></textarea>
            <button onclick="generate()">Generate Flashcards</button>
        </div>
        
        <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 20px;">
            <h2 id="deckTitleHeading" style="margin: 0;">Your Flashcards:</h2>
            
            <label id="filterContainer" style="display: none; font-weight: bold; font-size: 14px; cursor: pointer;">
                <input type="checkbox" id="dueFilterCheckbox" onchange="filterCardsOnScreen()"> 
                🎯 Show Only Due Today
            </label>
        </div>

        <div id="flashcardContainer"></div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
