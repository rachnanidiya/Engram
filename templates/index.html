<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recall — AI Flashcard Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="noise-overlay"></div>
    <div class="glow-orb orb-primary"></div>
    <div class="glow-orb orb-secondary"></div>
    <div class="glow-orb orb-tertiary"></div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-card">
            <div class="spinner-container">
                <div class="glow-spinner"></div>
                <div class="inner-pulse"></div>
                <span class="sparkle-icon">✨</span>
            </div>
            <h3 class="loading-title">Analyzing Literature</h3>
            <p id="loadingSubtitle" class="loading-sub">Gemini is extracting text matrices and parsing flashcards...</p>
        </div>
    </div>

    <div class="app-shell">

        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="brand-icon">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 20V2h13.5v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <span class="brand-name">Recall</span>
                </div>

                <button onclick="createNewDeckMode()" class="btn-new-deck">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Deck
                </button>
            </div>

            <div class="sidebar-section-label">Your Decks</div>

            <div id="decksList" class="decks-list">
                <div class="deck-loading">Loading decks...</div>
            </div>
        </aside>

        <main class="main">

            <header class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title" id="deckTitleHeading">AI Flashcard Studio</h1>
                    <p class="page-sub">Paste your notes — get study-ready flashcards instantly</p>
                </div>
                <div class="header-badge">
                    <span class="pulse-dot"></span>
                    Gemini 2.5 Pro
                </div>
            </header>

            <section class="input-panel-wrapper">
                <div class="input-panel">
                    <textarea id="textInput" class="note-input" rows="4" placeholder="Paste your notes, textbook excerpts, or any concept text here..."></textarea>
                    <div class="input-footer">
                        <div class="input-hint d-flex align-items-center gap-1">
                            <input type="file" id="pdfFileInput" accept=".pdf" style="display: none;" onchange="handleFileSelection()">
                            <button type="button" onclick="document.getElementById('pdfFileInput').click()" class="btn-action" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-2); max-width: fit-content; padding: 6px 12px;">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/></svg>
                                <span id="uploadButtonText">Upload PDF</span>
                            </button>
                            <span id="fileSelectedLabel" style="font-size: 12px; color: var(--success); display: none;"></span>
                        </div>
                        <button onclick="generate()" class="btn-generate" id="generateBtn">
                            <svg class="sparkle-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                            <span>Generate Cards</span>
                        </button>
                    </div>
                </div>
            </section>

            <div id="status" class="status-msg"></div>

            <section class="cards-section">
                <div class="cards-toolbar">
                    <div class="cards-count" id="cardsCount">Active Deck Cards Arena</div>
                    <label id="filterContainer" class="due-toggle">
                        <input type="checkbox" id="dueFilterCheckbox" onchange="filterCardsOnScreen()">
                        <span class="toggle-track">
                            <span class="toggle-thumb"></span>
                        </span>
                        <span class="toggle-label">Due only</span>
                    </label>
                </div>
                <div id="flashcardContainer" class="cards-grid"></div>
            </section>

        </main>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
