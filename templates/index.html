<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flashcard Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <div class="sidebar">
        <h3>🗂️ Saved Decks</h3>
        <button onclick="createNewDeckMode()" class="btn-create-deck">
            ➕ Create New Deck
        </button>
        <div id="decksList">Loading historical saves...</div>
    </div>

    <div class="main-content">
        <h1>📚 AI Flashcard Studio</h1>
        <div class="input-container">
            <textarea id="textInput" rows="4" placeholder="Paste structural data here to mint a brand NEW deck..."></textarea>
            <button onclick="generate()">Generate Flashcards</button>
        </div>
        <div id="status" class="status-box"></div>
        <h2 id="deckTitleHeading">Your Flashcards:</h2>
        <div id="flashcardContainer"></div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
